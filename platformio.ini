[env:esp32-c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    olikraus/U8g2
    mikalhart/TinyGPSPlus

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -O2

; Arduino framework typically uses src/ as project source dir.
; src/board src/drv src/lib src/svc src/app are auto-included.
